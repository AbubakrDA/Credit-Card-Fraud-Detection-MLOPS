version: '3.8'

# Shared environment variables for Airflow services
x-airflow-common: &airflow-common
  image: apache/airflow:2.7.1-python3.10
  environment:
    - AIRFLOW__CORE__EXECUTOR=LocalExecutor
    - AIRFLOW__CORE__LOAD_EXAMPLES=False
    - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=sqlite:////opt/airflow/airflow.db
    - MLFLOW_TRACKING_URI=http://mlflow:5000
  volumes:
    - ./pipelines:/opt/airflow/dags        # Mount your DAGs
    - ./src:/opt/airflow/src               # Mount src modules for DAG imports
    - ./logs:/opt/airflow/logs
    - airflow_db:/opt/airflow
  depends_on:
    airflow-init:
      condition: service_completed_successfully

services:

  # -----------------------------------------------------------------------
  # 1. MLFLOW TRACKING SERVER
  #    - Accessible at http://localhost:5000
  #    - Stores metadata in mlflow.db (SQLite) mounted from the host
  # -----------------------------------------------------------------------
  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.7.1
    container_name: fraud_mlflow
    ports:
      - "5000:5000"
    volumes:
      - .:/mlflow
    working_dir: /mlflow
    command: >
      mlflow server
      --backend-store-uri sqlite:///mlflow.db
      --default-artifact-root ./mlruns
      --host 0.0.0.0
      --port 5000
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
    restart: unless-stopped

  # -----------------------------------------------------------------------
  # 2. FASTAPI INFERENCE SERVICE
  #    - Accessible at http://localhost:8000/docs
  #    - Loads the FraudDetector model from the MLflow Registry
  # -----------------------------------------------------------------------
  fastapi:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: fraud_api
    ports:
      - "8000:8000"
    environment:
      - MLFLOW_TRACKING_URI=http://mlflow:5000
      - MLFLOW_MODEL_URI=models:/FraudDetector/latest
      - DECISION_THRESHOLD=0.5
    volumes:
      - .:/app
    depends_on:
      mlflow:
        condition: service_healthy
    restart: unless-stopped

  # -----------------------------------------------------------------------
  # 3. AIRFLOW INIT (One-time setup container)
  #    - Initializes the DB and creates the admin user, then exits.
  # -----------------------------------------------------------------------
  airflow-init:
    <<: *airflow-common
    container_name: fraud_airflow_init
    depends_on: []
    command: >
      bash -c "
        airflow db init &&
        airflow users create
          --username airflow
          --password airflow
          --firstname Admin
          --lastname User
          --role Admin
          --email admin@example.com
        echo 'Airflow initialized successfully.'
      "
    restart: "no"

  # -----------------------------------------------------------------------
  # 4. AIRFLOW WEBSERVER (Orchestration UI)
  #    - Accessible at http://localhost:8080
  #    - Login: airflow / airflow
  # -----------------------------------------------------------------------
  airflow-webserver:
    <<: *airflow-common
    container_name: fraud_airflow_webserver
    ports:
      - "8080:8080"
    command: webserver
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
    restart: unless-stopped

  # -----------------------------------------------------------------------
  # 5. AIRFLOW SCHEDULER (Pipeline Trigger Engine)
  #    - Detects and triggers your fraud_detection_training DAG
  # -----------------------------------------------------------------------
  airflow-scheduler:
    <<: *airflow-common
    container_name: fraud_airflow_scheduler
    command: scheduler
    restart: unless-stopped

# Persistent named volumes
volumes:
  airflow_db:
