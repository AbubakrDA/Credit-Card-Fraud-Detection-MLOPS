version: '3.8'

services:
  # 1. API Service (Inference)
  fastapi:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: fraud_api
    ports:
      - "8000:8000"
    environment:
      - MLFLOW_TRACKING_URI=sqlite:///mlflow.db
      - MLFLOW_MODEL_URI=models:/FraudDetector/1
      - DECISION_THRESHOLD=0.5
    volumes:
      - .:/app # Mount project root to access mlflow.db
    restart: always

  # 2. MLflow Server (Experiment Tracking)
  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.7.1
    container_name: fraud_mlflow
    ports:
      - "5000:5000"
    volumes:
      - .:/mlflow
    working_dir: /mlflow
    command: mlflow server --backend-store-uri sqlite:///mlflow.db --default-artifact-root ./mlruns --host 0.0.0.0

  # 3. Airflow Webserver (Orchestration UI)
  airflow-webserver:
    image: apache/airflow:2.7.1-python3.10
    container_name: fraud_airflow_web
    ports:
      - "8080:8080"
    volumes:
      - .:/opt/airflow
    environment:
      - AIRFLOW__CORE__LOAD_EXAMPLES=False
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=sqlite:////opt/airflow/airflow.db
    command: webserver

  # 4. Airflow Scheduler (Triggering Pipelines)
  airflow-scheduler:
    image: apache/airflow:2.7.1-python3.10
    container_name: fraud_airflow_scheduler
    volumes:
      - .:/opt/airflow
    environment:
      - AIRFLOW__CORE__LOAD_EXAMPLES=False
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=sqlite:////opt/airflow/airflow.db
    command: bash -c "airflow db init && airflow users create --username airflow --firstname Admin --lastname User --role Admin --email admin@example.com --password airflow && airflow scheduler"
